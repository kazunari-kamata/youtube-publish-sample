name: コードチェック

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 依存関係をインストール
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: 構文チェック
        run: |
          python -m py_compile scripts/make_video.py scripts/upload_youtube.py

      - name: テスト
        run: |
          python -m unittest discover -s tests
