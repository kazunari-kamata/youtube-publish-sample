name: YouTube 更新動画の公開

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: ffmpeg をインストール
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Python 依存関係をインストール
        run: |
          python -m pip install --upgrade pip
          python -m pip install google-api-python-client google-auth google-auth-oauthlib

      - name: YouTube Secrets を確認
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          test -n "$YOUTUBE_CLIENT_ID"
          test -n "$YOUTUBE_CLIENT_SECRET"
          test -n "$YOUTUBE_REFRESH_TOKEN"

      - name: 更新紹介動画を生成
        run: |
          python scripts/make_video.py \
            --output output/update.mp4 \
            --title "main ブランチ更新" \
            --message "新しい変更がマージされました。"

      - name: YouTube に限定公開アップロード
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          python scripts/upload_youtube.py \
            --file output/update.mp4 \
            --title "main ブランチ更新のお知らせ" \
            --description "この動画は main ブランチ更新後に GitHub Actions で自動生成されました。" \
            --tags "github-actions,automation,youtube,自動化" \
            --privacy-status unlisted
