name: YouTube 更新動画の公開

on:
  push:
    branches:
      - main
    paths:
      - export/update.mp4
      - export/update-shorts.mp4
      - export/youtube-upload-target.txt
  workflow_dispatch:
    inputs:
      upload_target:
        description: "アップロード対象"
        required: true
        default: "video"
        type: choice
        options:
          - video
          - shorts
          - both

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: ffmpeg をインストール
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Python 依存関係をインストール
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: YouTube Secrets を確認
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          test -n "$YOUTUBE_CLIENT_ID"
          test -n "$YOUTUBE_CLIENT_SECRET"
          test -n "$YOUTUBE_REFRESH_TOKEN"

      - name: アップロード対象を決定
        id: upload_target
        env:
          WORKFLOW_UPLOAD_TARGET: ${{ inputs.upload_target }}
        run: |
          upload_target="$WORKFLOW_UPLOAD_TARGET"
          if [ -z "$upload_target" ] && [ -s export/youtube-upload-target.txt ]; then
            upload_target="$(head -n 1 export/youtube-upload-target.txt)"
          fi
          upload_target="$(printf '%s' "$upload_target" | tr '[:upper:]' '[:lower:]' | tr -d '[:space:]')"
          if [ -z "$upload_target" ]; then
            upload_target="video"
          fi

          case "$upload_target" in
            video)
              echo "upload_target=video" >> "$GITHUB_OUTPUT"
              echo "upload_video=true" >> "$GITHUB_OUTPUT"
              echo "upload_shorts=false" >> "$GITHUB_OUTPUT"
              ;;
            shorts)
              echo "upload_target=shorts" >> "$GITHUB_OUTPUT"
              echo "upload_video=false" >> "$GITHUB_OUTPUT"
              echo "upload_shorts=true" >> "$GITHUB_OUTPUT"
              ;;
            both)
              echo "upload_target=both" >> "$GITHUB_OUTPUT"
              echo "upload_video=true" >> "$GITHUB_OUTPUT"
              echo "upload_shorts=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "upload_target must be video, shorts, or both: $upload_target" >&2
              exit 1
              ;;
          esac

      - name: アップロード対象動画を確認
        run: |
          echo "upload target: ${{ steps.upload_target.outputs.upload_target }}"
          if [ "${{ steps.upload_target.outputs.upload_video }}" = "true" ]; then
            test -s export/update.mp4
            echo "通常動画:"
            ffprobe -v error \
              -show_entries format=duration,size \
              -show_entries stream=width,height,nb_frames \
              -of default=noprint_wrappers=1 \
              export/update.mp4
          fi
          if [ "${{ steps.upload_target.outputs.upload_shorts }}" = "true" ]; then
            test -s export/update-shorts.mp4
            echo "Shorts動画:"
            ffprobe -v error \
              -show_entries format=duration,size \
              -show_entries stream=width,height,nb_frames \
              -of default=noprint_wrappers=1 \
              export/update-shorts.mp4
          fi

      - name: YouTube メタデータを作成
        id: metadata
        env:
          TZ: Asia/Tokyo
        run: |
          uploaded_at="$(date '+%Y-%m-%d %H:%M:%S %Z')"

          title=""
          if [ -s export/youtube-title.txt ]; then
            title="$(head -n 1 export/youtube-title.txt)"
          fi
          if [ -z "$title" ]; then
            title="更新動画 ${uploaded_at}"
          fi

          description=""
          if [ -s export/youtube-description.md ]; then
            description="$(cat export/youtube-description.md)"
          fi
          if [ -z "$description" ]; then
            printf -v description '%s\n\nアップロード日時: %s' \
              "GitHub Actions からアップロードした更新動画です。" \
              "$uploaded_at"
          fi

          shorts_title=""
          if [ -s export/youtube-shorts-title.txt ]; then
            shorts_title="$(head -n 1 export/youtube-shorts-title.txt)"
          fi
          if [ -z "$shorts_title" ]; then
            shorts_title="更新Shorts ${uploaded_at} #Shorts"
          fi

          shorts_description=""
          if [ -s export/youtube-shorts-description.md ]; then
            shorts_description="$(cat export/youtube-shorts-description.md)"
          fi
          if [ -z "$shorts_description" ]; then
            printf -v shorts_description '%s\n\nアップロード日時: %s\n\n%s' \
              "GitHub Actions からアップロードした更新動画の要約Shortsです。" \
              "$uploaded_at" \
              "#Shorts"
          fi

          echo "title=${title}" >> "$GITHUB_OUTPUT"
          echo "shorts_title=${shorts_title}" >> "$GITHUB_OUTPUT"
          {
            echo "description<<EOF"
            echo "$description"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          {
            echo "shorts_description<<EOF"
            echo "$shorts_description"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: YouTube に通常動画を限定公開アップロード
        if: steps.upload_target.outputs.upload_video == 'true'
        id: upload
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_TITLE: ${{ steps.metadata.outputs.title }}
          YOUTUBE_DESCRIPTION: ${{ steps.metadata.outputs.description }}
        run: |
          python scripts/upload_youtube.py \
            --file export/update.mp4 \
            --title "$YOUTUBE_TITLE" \
            --description "$YOUTUBE_DESCRIPTION" \
            --tags "github-actions,automation,youtube,自動化" \
            --privacy-status unlisted

      - name: YouTube Shorts を限定公開アップロード
        if: steps.upload_target.outputs.upload_shorts == 'true'
        id: upload_shorts
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_TITLE: ${{ steps.metadata.outputs.shorts_title }}
          YOUTUBE_DESCRIPTION: ${{ steps.metadata.outputs.shorts_description }}
        run: |
          python scripts/upload_youtube.py \
            --file export/update-shorts.mp4 \
            --title "$YOUTUBE_TITLE" \
            --description "$YOUTUBE_DESCRIPTION" \
            --tags "github-actions,automation,youtube,shorts,自動化,要約" \
            --privacy-status unlisted

      - name: アップロード結果を表示
        env:
          YOUTUBE_TITLE: ${{ steps.metadata.outputs.title }}
          YOUTUBE_SHORTS_TITLE: ${{ steps.metadata.outputs.shorts_title }}
        run: |
          echo "Upload target: ${{ steps.upload_target.outputs.upload_target }}"
          echo "### YouTube upload result" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Upload target: ${{ steps.upload_target.outputs.upload_target }}" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.upload_target.outputs.upload_video }}" = "true" ]; then
            echo "YouTube title: $YOUTUBE_TITLE"
            echo "YouTube video ID: ${{ steps.upload.outputs.video_id }}"
            echo "YouTube video URL: ${{ steps.upload.outputs.video_url }}"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "#### 通常動画" >> "$GITHUB_STEP_SUMMARY"
            echo "- Title: $YOUTUBE_TITLE" >> "$GITHUB_STEP_SUMMARY"
            echo "- Video ID: ${{ steps.upload.outputs.video_id }}" >> "$GITHUB_STEP_SUMMARY"
            echo "- URL: ${{ steps.upload.outputs.video_url }}" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "${{ steps.upload_target.outputs.upload_shorts }}" = "true" ]; then
            echo "YouTube Shorts title: $YOUTUBE_SHORTS_TITLE"
            echo "YouTube Shorts video ID: ${{ steps.upload_shorts.outputs.video_id }}"
            echo "YouTube Shorts video URL: ${{ steps.upload_shorts.outputs.video_url }}"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "#### Shorts" >> "$GITHUB_STEP_SUMMARY"
            echo "- Title: $YOUTUBE_SHORTS_TITLE" >> "$GITHUB_STEP_SUMMARY"
            echo "- Video ID: ${{ steps.upload_shorts.outputs.video_id }}" >> "$GITHUB_STEP_SUMMARY"
            echo "- URL: ${{ steps.upload_shorts.outputs.video_url }}" >> "$GITHUB_STEP_SUMMARY"
          fi
