name: YouTube 更新動画の公開

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: ffmpeg をインストール
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Python 依存関係をインストール
        run: |
          python -m pip install --upgrade pip
          python -m pip install google-api-python-client google-auth google-auth-oauthlib

      - name: 更新紹介動画を生成
        run: |
          python scripts/make_video.py \
            --output output/update.mp4 \
            --title "Main Branch Updated" \
            --message "A new change was merged and published."

      - name: YouTube に限定公開アップロード
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          python scripts/upload_youtube.py \
            --file output/update.mp4 \
            --title "Main Branch Update" \
            --description "This short update video was generated by GitHub Actions after a main branch update." \
            --tags "github-actions,automation,youtube" \
            --privacy-status unlisted
